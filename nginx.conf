server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets emitted by Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path returns index.html so the client router can resolve it.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
