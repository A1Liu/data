name: Check
on: [push]

jobs:
  dep-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          cache-dependency-path: pnpm-lock.yaml
          cache: pnpm

      - name: Install packages
        shell: bash
        run: |
          pnpm install

          if ! test -z "`git diff --stat`"; then
            echo "Changes were found; please run 'pnpm install' and commit the output."
            echo
            git diff --name-only
            exit 1
          fi

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          cache-dependency-path: pnpm-lock.yaml
          cache: pnpm

      - name: Install packages
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Biome Format
        run: |
          pnpm exec biome format

      - name: Biome Lint
        run: |
          pnpm exec biome lint

      - name: Biome Check
        run: |
          pnpm exec biome check

  types:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          cache-dependency-path: pnpm-lock.yaml
          cache: pnpm

      - name: Install packages
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Check Types
        run: pnpm ts-check
